# Jetty Planning System (JPS) - Local development & preview
# Run: docker compose up --build
# App: http://localhost:3001  (Jetty Live via /jetty-live-stream and /jetty-live-ws)
#
# Requires rtsp-stream-viewer/.env (copy from .env.example) for jps-jetty-live.
# Backend API must run separately (Backend/docker-compose.yml on host :3000).

services:
  jps-jetty-live:
    build:
      context: ./rtsp-stream-viewer
      dockerfile: Dockerfile
    container_name: jps-jetty-live
    restart: unless-stopped
    env_file:
      - ./rtsp-stream-viewer/.env
    environment:
      HTTP_PORT: "3081"
      WS_PORT: "9999"

  jps-web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Same-origin /api/v1 so nginx proxies multipart + cookies to API on the host (host.docker.internal:3000)
        VITE_API_BASE_URL: /api/v1
    ports:
      - "3001:80"
    container_name: jps-mockup
    depends_on:
      - jps-jetty-live
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./Frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
