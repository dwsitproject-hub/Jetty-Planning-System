# Jetty Planning System (JPS) - Local development & preview
# Run: docker-compose up --build
# App: http://localhost:3001

services:
  jps-web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Same-origin /api/v1 so nginx proxies multipart + cookies to API on the host (host.docker.internal:3000)
        VITE_API_BASE_URL: /api/v1
    ports:
      - "3001:80"
    container_name: jps-mockup
    extra_hosts:
      - 'host.docker.internal:host-gateway'
