# App server only (frontend + nginx reverse proxy to backend private IP).
# Run on the APP ECS (e.g. 172.28.92.56). See Docs/Guide/ALICLOUD-DEPLOYMENT-GUIDE.md
# Canonical source: Backend/infra/docker-compose.app.yml
#
# Prerequisites:
# - Edit Frontend/nginx.alicloud-app.conf: set upstream server to BACKEND private IP.
# - Root .env (same directory) must define VITE_API_BASE_URL for the browser (same host users open).
# - Jetty Live: copy rtsp-stream-viewer/.env.example → rtsp-stream-viewer/.env (RTSP_URL, etc.).
#
# Example (busy app host — use a free host port, e.g. 3080):
#   JPS_FE_PORT=3080
# Prefer relative API base so both VPC private IP and public EIP work without rebuilding:
#   VITE_API_BASE_URL=/api/v1
#
# Deploy / update (includes Jetty Live stream container):
#   docker compose -f docker-compose.app.yml up -d --build
#
# If migrating from host systemd jps-jetty-live, disable it first to avoid confusion:
#   sudo systemctl disable --now jps-jetty-live

services:
  jps-jetty-live:
    build:
      context: ./rtsp-stream-viewer
      dockerfile: Dockerfile
    container_name: jps-jetty-live
    restart: unless-stopped
    env_file:
      - ./rtsp-stream-viewer/.env
    environment:
      HTTP_PORT: "3081"
      WS_PORT: "9999"

  jps-fe:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env}
        VITE_ENABLE_PIPELINE_ACTUALS_BETA: ${VITE_ENABLE_PIPELINE_ACTUALS_BETA:-false}
    ports:
      # Default 3001; on hosts where 3001 is taken (see ALICLOUD-DEPLOYMENT-GUIDE.md), set JPS_FE_PORT=3080
      - "${JPS_FE_PORT:-3001}:80"
    container_name: jps-fe
    restart: unless-stopped
    depends_on:
      - jps-jetty-live
    volumes:
      - ./Frontend/nginx.alicloud-app.conf:/etc/nginx/conf.d/default.conf:ro
