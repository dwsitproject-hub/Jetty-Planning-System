# Nginx for the APP server only: SPA + reverse proxy to API on the backend server (private VPC).
# Edit the upstream address to match your backend server private IP (e.g. 172.28.92.57).

upstream jps_backend {
    server 172.28.92.57:3000;
    keepalive 8;
}

upstream jps_jetty_live_http {
    server jps-jetty-live:3081;
    keepalive 4;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API (Express mounts at /api/v1)
    location /api/ {
        proxy_pass http://jps_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SSO / OIDC + legacy Hub bridge — must hit Express backend, not SPA
    location /auth/ {
        proxy_pass http://jps_backend/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Jetty Live — jps-jetty-live container (docker-compose.app.yml, HTTP 3081 / WS 9999).
    location /jetty-live-stream/ {
        proxy_pass http://jps_jetty_live_http/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jetty-live-ws {
        proxy_pass http://jps-jetty-live:9999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
