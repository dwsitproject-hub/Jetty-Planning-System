# Nginx for the APP server only: SPA + reverse proxy to API on the backend server (private VPC).
# Edit the upstream address to match your backend server private IP (e.g. 172.28.92.57).

upstream jps_backend {
    server 172.28.92.57:3000;
    keepalive 8;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API (Express mounts at /api/v1)
    location /api/ {
        proxy_pass http://jps_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Jetty Live — rtsp-stream-viewer on the APP host (systemd, HTTP_PORT=3081, WS_PORT=9999).
    # Requires extra_hosts host.docker.internal in docker-compose.app.yml (see Docs/Guide/JETTY-LIVE-STREAM-DEPLOYMENT.md).
    location /jetty-live-stream/ {
        proxy_pass http://host.docker.internal:3081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jetty-live-ws {
        proxy_pass http://host.docker.internal:9999;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
