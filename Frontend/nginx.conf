server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  # Security headers (H-3). Tune CSP when you add non-self scripts or connect-src.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  # Start with report-only in staging if needed; tighten script-src for your build.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; img-src 'self' data: blob:; font-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* https: ws: wss:;" always;
  # Proxy API to host gateway (SPA built with relative /api/v1). Requires extra_hosts host.docker.internal.
  location /api/ {
    proxy_pass http://host.docker.internal:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 130s;
    client_max_body_size 25m;
  }
  location / {
    try_files $uri $uri/ /index.html;
  }
  location /assets/ {
    alias /usr/share/nginx/html/assets/;
  }
}
