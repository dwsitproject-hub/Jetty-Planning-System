# Canonical app-server compose file.
# Root compatibility entrypoint remains at /docker-compose.app.yml.
# Prefer VITE_API_BASE_URL=/api/v1 for private + public EIP (see Docs/Guide/Allowing-Public-Access.md).
#
# Run from repo root:
#   docker compose -f Backend/infra/docker-compose.app.yml up -d --build

services:
  jps-fe:
    build:
      context: ../../Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env}
    ports:
      - "${JPS_FE_PORT:-3001}:80"
    container_name: jps-fe
    restart: unless-stopped
    volumes:
      - ../../Frontend/nginx.alicloud-app.conf:/etc/nginx/conf.d/default.conf:ro
